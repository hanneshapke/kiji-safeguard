name: Release

# Publishes kiji-safeguard to PyPI whenever a commitizen version bump lands on
# main. The bump itself is made on a branch (`uv run cz bump`); merging it to
# main changes `[project].version` in pyproject.toml, which this workflow
# detects and turns into a release.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.check.outputs.released }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Need the parent commit to diff pyproject.toml against.
          fetch-depth: 2
      - id: check
        name: Compare pyproject version with previous commit
        run: |
          set -euo pipefail
          read_version() {
            python3 -c "import sys, tomllib; print(tomllib.load(open(sys.argv[1], 'rb'))['project']['version'])" "$1"
          }
          current="$(read_version pyproject.toml)"
          if git show HEAD~1:pyproject.toml > /tmp/prev_pyproject.toml 2>/dev/null; then
            previous="$(read_version /tmp/prev_pyproject.toml 2>/dev/null || echo '')"
          else
            previous=""
          fi
          echo "Previous version: ${previous:-<none>}"
          echo "Current version:  ${current}"
          echo "version=${current}" >> "$GITHUB_OUTPUT"
          # workflow_dispatch always releases the current version; a push only
          # releases when the version actually changed.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${current}" != "${previous}" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No version change — skipping release."
          fi

  publish:
    name: Build and publish to PyPI
    needs: detect
    if: needs.detect.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kiji-safeguard
    permissions:
      id-token: write # OIDC token for PyPI trusted publishing
      contents: write # create the git tag + GitHub Release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest
      - name: Build sdist and wheel
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          # Don't fail the run if this version was already uploaded.
          skip-existing: true
          # Trusted Publishing (OIDC) is used by default — no token needed.
          # To use an API token instead, set the secret and uncomment:
          # password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — skipping."
          else
            gh release create "$tag" \
              --target "${{ github.sha }}" \
              --title "$tag" \
              --notes "Automated release of kiji-safeguard ${VERSION} to PyPI."
          fi
